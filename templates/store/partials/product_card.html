<div class="card product-card border-0 shadow-sm h-100">
    <img src="{{ product.image_url }}" class="card-img-top product-card-image" alt="{{ product.name }}">
    <div class="card-body d-flex flex-column">
        <div class="small text-muted mb-2">{{ product.category.name }}</div>
        <h3 class="h5">{{ product.name }}</h3>
        <p class="text-muted flex-grow-1">{{ product.short_description }}</p>
        <div class="d-flex justify-content-between align-items-center mt-3 gap-2 flex-wrap">
            <span class="fw-bold fs-5">{{ product.price }} ₽</span>
            <div class="d-flex gap-2">
                <a href="{{ product.get_absolute_url }}" class="btn btn-outline-dark btn-sm rounded-pill">Открыть</a>
                <form method="post" action="{% url 'store:add_to_cart' product.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.get_full_path }}">
                    <button class="btn btn-warning btn-sm rounded-pill">В корзину</button>
                </form>
            </div>
        </div>
    </div>
</div>
